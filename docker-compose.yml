services:
  # ── Base de datos PostgreSQL ───────────────────────
  postgres:
    image: postgres:15
    container_name: sophie-db
    environment:
      POSTGRES_USER: sophie_user
      POSTGRES_PASSWORD: sophie_pass
      POSTGRES_DB: sophie_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - sophie-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sophie_user -d sophie_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────
  backend:
    build: ./backend
    container_name: sophie-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sophie_user:sophie_pass@postgres:5432/sophie_db
      SECRET_KEY: dev_secret_key_change_in_production
      MFA_ISSUER: "SOPHIE - Big Solutions"
      MFA_EMAIL_CODE_EXPIRE_MINUTES: 10
      MFA_EMAIL_DEBUG_FALLBACK: "true"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: your_email@gmail.com
      SMTP_PASSWORD: your_app_password
      SMTP_USE_TLS: "true"
      SMTP_FROM_EMAIL: your_email@gmail.com
      SMTP_FROM_NAME: SOPHIE
      VAULT_SECRET_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost", "http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sophie-net

  # ── Frontend Vue.js 3 ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: sophie-frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - sophie-net

  # ── Nginx Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sophie-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - sophie-net

volumes:
  pg_data:


networks:
  sophie-net:
    driver: bridge
